# JimOS Calamares Installer Configuration

modules:
    - show
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
    - finished

welcome:
    configurationId: "jimos"
    languages:
        - en
        - en_GB
        - es
        - fr
        - de
        - it
        - pt_BR
        - ru
        - zh_CN
        - zh_TW
        - ja
        - ko
    defaultLocale: en_US

locale:
    timezoneLocation: "America/New_York"
    defaultLocale: en_US

keyboard:
    layoutVariant: ""
    layoutKey: us

partition:
    backend: "kpmcore"
    userSwapChoices:
        - no_swap
        - small_swap
        - full_swap
    requiredStorageGiB: 20
    recommendedStorageGiB: 50
    enableLuksAutomatedPartitioning: true
    efibootLoaderInstallTargets:
        - path: "/boot/efi"
          firmwarePath: "/sys/firmware/efi/efivars"
    mountOptions:
        - "defaults"
        - "noatime"
    fileSystems:
        - ext4
        - btrfs
        - xfs
    partitions:
        - name: "EFI"
          filesystem: "fat32"
          size: "512MiB"
          mountPoint: "/boot/efi"
        - name: "Root"
          filesystem: "ext4"
          size: "remaining"
          mountPoint: "/"
    btrfsDefaultSubvolume: true
    btrfsSubvolumes:
        - path: "@"
          mountPoint: "/"
        - path: "@home"
          mountPoint: "/home"
        - path: "@var"
          mountPoint: "/var"
        - path: "@cache"
          mountPoint: "/var/cache"
        - path: "@log"
          mountPoint: "/var/log"

users:
    defaultGroups:
        - audio
        - video
        - network
        - power
        - wheel
        - sudo
        - input
        - kvm
        - libvirt
    setRootPassword: true
    requireStrongPasswords: true
    passwordMinLength: 8
    passwordComplexity:
        - uppercase
        - lowercase
        - numbers
        - symbols
    autoLoginUser: false
    encryptHomeDirectory: false

summary:
    show: true
    debug: false

finished:
    restartNowEnabled: true
    restartNowCommand: "/sbin/reboot"
    restartNowDisplayed: true
    restartNowChecked: true
    postRestartCommand: ""

branding:
    brandingComponent: "jimos-branding"
    windowTitle: "JimOS Installer"
    logoImage: "/usr/share/jimos/branding/logo.png"
    stylesheet: "/usr/share/jimos/branding/calamares.css"

viewmanager:
    disableBackButton: false
    expandMode: "neither"

settings:
    debug: false
    showDebugInfo: false
    disableCancel: false
