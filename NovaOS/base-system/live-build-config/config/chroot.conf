#!/bin/bash
# NovaOS Chroot Configuration

# Install additional packages during chroot stage
export LB_CHROOT_PACKAGES="standard"

# Configure APT sources
cat > config/chroot.conf << 'EOF'
# Live-build chroot configuration

# Enable all repository components
LB_ARCHIVE_AREAS="main contrib non-free non-free-firmware"

# Security updates
LB_SECURITY="true"

# Backports
LB_BACKPORTS="true"

# Proposed updates (disable for stable release)
LB_PROPOSED_UPDATES="false"

# Additional APT options
LB_APT_OPTIONS="-o Acquire::Check-Valid-Until=false -o Acquire::https::Timeout=30"

# Install recommends
LB_RECOMMENDS="true"

# Install suggests (optional, increases size)
LB_SUGGESTS="false"
EOF

# Create apt sources list for chroot
mkdir -p config/archives/

cat > config/archives/debian.list.chroot << 'EOF'
deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
deb http://deb.debian.org/debian bookworm-backports main contrib non-free non-free-firmware
deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
EOF

echo "Chroot configuration complete"
