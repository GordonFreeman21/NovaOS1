[Settings]
gtk-theme-name=JimOS-Dark
gtk-application-prefer-dark-theme=true
gtk-decoration-layout=:minimize,maximize,close
gtk-enable-animations=true
gtk-cursor-theme-name=Jim-Cursor
gtk-cursor-theme-size=24
gtk-font-name=Inter 11
gtk-monospace-font-name=JetBrains Mono 11
gtk-icon-theme-name=Jim-Icons
gtk-toolbar-style=GTK_TOOLBAR_ICONS
gtk-toolbar-icon-size=GTK_ICON_SIZE_LARGE_TOOLBAR
gtk-button-images=false
gtk-menu-images=false
gtk-enable-event-sounds=true
gtk-enable-input-feedback-sounds=true
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
gtk-xft-dpi=98304

[ColorScheme]
accent_color=#6c63ff
accent_background=#6c63ff
window_bg_color=#0a0a12
view_bg_color=#16161e
headerbar_bg_color=#1f1f2e
card_bg_color=#16161e
dialog_bg_color=#1f1f2e
popover_bg_color=#1f1f2e
