#!/bin/bash
# JimOS Bootstrap Configuration

# Use minimal bootstrap to reduce initial size
export LB_BOOTSTRAP_FLAVOUR="minimal"

# Additional bootstrap packages (essential only)
export LB_BOOTSTRAP_PACKAGES="systemd systemd-sysv dbus udev"

# Include firmware in bootstrap
export LB_FIRMWARE_CHROOT="true"

# Bootstrap stage configuration
cat > config/bootstrap.conf << EOF
# Live-build bootstrap configuration
LB_BOOTSTRAP_INCLUDE="systemd systemd-sysv dbus udev base-files bash coreutils debian-archive-keyring init-system-helpers ncurses-base netbase passwd sed sysvinit-utils tar util-linux"
LB_BOOTSTRAP_EXCLUDE=""
EOF

echo "Bootstrap configuration complete"
