#!/bin/bash
# JimOS Common Configuration for live-build

# Set distribution to Debian Bookworm (Stable)
export LB_DISTRIBUTION="bookworm"

# Include all archive areas including non-free firmware
export LB_ARCHIVE_AREAS="main contrib non-free non-free-firmware"

# Disable APT indices to reduce ISO size
export LB_APT_INDICES="false"

# Use GRUB bootloader for UEFI and BIOS support
export LB_BOOTLOADER="grub"

# Set ISO volume name
export LB_ISO_VOLUME="NOVAOS_INSTALL"

# Set ISO application name
export LB_ISO_APPLICATION="JimOS"

# Set ISO publisher
export LB_ISO_PUBLISHER="JimOS Project <https://jimos.org>"

# Binary image format
export LB_BINARY_IMAGES="iso-hybrid"

# Disable memtest (we'll use a custom boot menu)
export LB_MEMTEST="none"

# Disable debian-installer (we use Calamares)
export LB_DEBIAN_INSTALLER="none"

# Enable firmware includes
export LB_FIRMWARE_INCLUDES="true"

# Set compression for squashfs
export LB_SQUASHFS_COMPRESSION="xz"

# Set compression options for better compression ratio
export LB_SQUASHFS_COMPRESSION_OPTIONS="-Xbcj x86 -b 1M"

# Enable parallel downloads
export LB_APT_OPTIONS="-o Acquire::http::Pipeline-Depth=0 -o Acquire::http::No-Cache=true -o Acquire::BrokenProxy=true"

# Set timezone
export LB_TIMEZONE="UTC"

# Set keymap
export LB_KEYMAPS="us"

# Enable systemd
export LB_SYSTEMD="true"

# Disable recommended packages to reduce size (optional)
# export LB_RECOMMENDS="false"

# Enable security updates during build
export LB_SECURITY="true"

# Enable backports repository
export LB_BACKPORTS="true"

# Mirror settings
export LB_MIRROR_BOOTSTRAP="http://deb.debian.org/debian"
export LB_MIRROR_CHROOT="http://deb.debian.org/debian"
export LB_MIRROR_BINARY="http://deb.debian.org/debian"

# Additional hooks directory
export LB_HOOKS="../hooks"

echo "JimOS live-build common configuration loaded"
