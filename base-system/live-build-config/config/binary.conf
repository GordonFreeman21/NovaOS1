#!/bin/bash
# JimOS Binary Configuration

cat > config/binary.conf << 'EOF'
# Live-build binary configuration

# ISO Hybrid image (supports both BIOS and UEFI)
LB_BINARY_IMAGES="iso-hybrid"

# Bootloader
LB_BOOTLOADER="grub"

# GRUB configuration
LB_GRUB_PLATFORMS="pc efi"

# ISO volume ID
LB_ISO_VOLUME="NOVAOS_INSTALL"

# ISO application name
LB_ISO_APPLICATION="JimOS"

# ISO publisher
LB_ISO_PUBLISHER="JimOS Project <https://jimos.org>"

# ISO version
LB_ISO_VERSION="1.0"

# Compression for filesystem
LB_SQUASHFS_COMPRESSION="xz"
LB_SQUASHFS_COMPRESSION_OPTIONS="-Xbcj x86 -b 1M"

# Checksums to generate
LB_CHECKSUMS="sha256"

# Disable memtest
LB_MEMTEST="none"

# Debian installer disabled (we use Calamares)
LB_DEBIAN_INSTALLER="false"
LB_DEBIAN_INSTALLER_DISTRIBUTION=""

# Generate APT indices
LB_APT_INDICES="false"

# Firmware includes
LB_FIRMWARE_BINARY="true"
EOF

echo "Binary configuration complete"
